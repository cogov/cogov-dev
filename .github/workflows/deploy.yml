name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Download assets
        run: |
          pip install awscli --quiet
          mkdir -p public/assets
          aws s3 cp s3://$AWS_BUCKET/ public/assets --recursive --endpoint-url $AWS_ENDPOINT_URL
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}

      - name: Build
        run: cd app/cogov.me && bun run build
        env:
          NODE_ENV: production
          ASSET_BASE_URL: ${{ secrets.ASSET_BASE_URL }}

      - name: Prerender
        run: |
          cd app/cogov.me
          bun ./start.ts &
          sleep 5
          bun ./prerender.ts
          kill %1
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          cd app/cogov.me/dist/browser
          echo "Checking for expected HTML files..."
          for page in index connect declaration ecosystem holochain services site specs vision team/raymond-d-powell; do
            file="${page}/index.html"
            if [ "$page" = "index" ]; then file="index.html"; fi
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file"
          done
          # Check non-HTML files
          for file in robots.txt; do
            if [ ! -f "$file" ]; then
              echo "MISSING: $file"
              exit 1
            fi
            echo "OK: $file"
          done
          echo "All expected files present."

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/cogov.me/dist/browser --project-name=cogov-me

      - name: Smoke test live site
        run: |
          echo "Waiting 10s for deployment to propagate..."
          sleep 10
          for path in / /connect /declaration /ecosystem /holochain /protocol.love /services /site /specs /team/raymond-d-powell /vision /robots.txt /sitemap.xml; do
            status=$(curl -sL -o /dev/null -w '%{http_code}' "https://cogov.me${path}")
            if [ "$status" != "200" ]; then
              echo "FAIL: https://cogov.me${path} returned $status"
              exit 1
            fi
            echo "OK ($status): https://cogov.me${path}"
          done
          echo "All smoke tests passed."
