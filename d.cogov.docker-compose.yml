services:
  www:
    build:
      dockerfile: ./d.cogov-www.Dockerfile
    env_file:
      - .env
    expose:
      - "80"
      - "443"
      - "4020"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.services.mi-www_site.loadbalancer.server.port=4009"
      - "traefik.http.routers.mi-www_site.rule=Host(`${HOST:-mi-www.site}`)"
      - "traefik.http.routers.mi-www_site.tls.certresolver=acme"
      - "traefik.http.middlewares.test-retry.retry.attempts=4"
      - "traefik.http.middlewares.test-retry.retry.initialinterval=100ms"
    networks:
      - web
networks:
  web:
    external: true
